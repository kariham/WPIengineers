<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPI Inspecties - QHSE</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <header>
        <h1>WPI Inspecties</h1>
        <p>QHSE Management Tool</p>
    </header>

    <main>
        <section id="inspection-selector">
            <h2>Kies een Werkplekinspectie</h2>
            <button onclick="showInspection('engineers')">WPI Engineers</button>
            <button onclick="showInspection('seveso')">WPI Magazijn Seveso</button>
            <button onclick="showInspection('brand')">WPI Gebouw & Brandveiligheid</button>
        </section>

        <form id="wpi-form" class="hidden">
            <div class="meta-data">
                <h3>Algemene Gegevens</h3>
                <label>Inspector: <input type="text" id="inspector_name" required></label>
                <label>Datum: <input type="date" id="inspection_date" required></label>
                <label>Locatie/Project: <input type="text" id="inspection_location" required></label>
            </div>

            <div id="form-questions"></div>

            <div class="form-actions">
                <button type="button" class="btn-secondary" onclick="resetForm()">Annuleren</button>
                <button type="submit" class="btn-success">Exporteer naar PDF</button>
            </div>
        </form>
    </main>

    <!-- JavaScript pas inladen als de HTML volledig is opgebouwd -->
    <script src="js/main.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.error(err));
            });
        }
    </script>
</body>
</html>
